name: CI/CD for academic-schedule

on:
  push:
    branches: [ main, developer-parser ]
  pull_request:
    branches: [ main, developer-parser]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
       uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:

          python-version: '3.12''

          python-version: '3.12'

      - name: Install dependencies
        run : |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          pip install -r requirements-dev.txt

      - name: Run tests from schedule_parser/testing
        run: |
          pytest schedule_parser/testing/test_auth.py -v
          pytest schedule_parser/testing/test_post_request.py -v

      - name: Run tests configs
        run: |
          pytest testing_configs/test_config_user.py -v
