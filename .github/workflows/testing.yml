name: CI/CD for academic-schedule-parser

on:
  push:
    branches: [ main, developer-parser ]
  pull_request:
    branches: [ main, developer-parser ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-testing.txt
        pip install -r requirements-dev.txt

    - name: Create .env file from secrets
      run: |
        echo "AUTH_URL=${{ SECRETS.AUTH_URL }}" >> .env
        echo "TOP_USERNAME=${{ SECRETS.TOP_USERNAME }}" >> .env
        echo "PASSWORD=${{ SECRETS.PASSWORD }}" >> .env
        echo "APPLICATION_KEY=${{ SECRETS.APPLICATION_KEY }}" >> .env
        echo "SCHEDULE_URL=${{ SECRETS.SCHEDULE_URL }}" >> .env
        echo "ID_CITY=${{ SECRETS.ID_CITY }}" >> .env

    - name: Debug - check .env file
      run: cat .env

    - name: Run tests from schedule_parser/testing
      run: |
        pytest schedule_parser/testing/test_auth.py -v
        pytest schedule_parser/testing/test_post_request.py -v

    - name: Run tests configs
      run: |
        pytest testing_configs/test_config_user.py -v
